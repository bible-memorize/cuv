<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>和合本背經</title>
<style>
  :root {
    --bg: #fafaf7;
    --card: #ffffff;
    --ink: #2a2a2a;
    --muted: #8a8a8a;
    --accent: #6b4f3a;
    --ok: #4a7c59;
    --no: #a8615a;
    --line: #e5e0d8;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", "Noto Serif TC", serif;
    background: var(--bg); color: var(--ink);
    line-height: 1.8;
  }
  .app { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem; }
  header {
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 1px solid var(--line); padding-bottom: 0.75rem; margin-bottom: 1rem;
  }
  h1 { font-size: 1.1rem; margin: 0; font-weight: 600; letter-spacing: 0.05em; }
  .stats { font-size: 0.85rem; color: var(--muted); }
  nav {
    display: flex; gap: 0.5rem; margin-bottom: 1.25rem;
    border-bottom: 1px solid var(--line); padding-bottom: 0.5rem;
  }
  nav button {
    background: none; border: none; color: var(--muted); padding: 0.4rem 0.8rem;
    cursor: pointer; font-size: 0.95rem; font-family: inherit; border-radius: 4px;
  }
  nav button.active { color: var(--accent); background: #f0ece4; font-weight: 600; }
  nav button:hover { color: var(--ink); }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 6px;
    padding: 1.75rem 1.5rem; box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  .ref { font-size: 0.95rem; color: var(--accent); font-weight: 600; letter-spacing: 0.1em; margin-bottom: 1rem; }
  .ref .speak { float: right; cursor: pointer; opacity: 0.6; font-size: 1.1rem; user-select: none; }
  .ref .speak:hover { opacity: 1; }
  .text {
    font-size: 1.35rem; line-height: 2.1;
    font-family: "Noto Serif TC", "Songti TC", serif;
    min-height: 6rem; letter-spacing: 0.05em;
  }
  .text .masked { color: var(--muted); opacity: 0.5; }
  .text .revealed { color: var(--ink); }

  .controls {
    display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1.5rem;
  }
  button.btn {
    flex: 1; min-width: 100px; padding: 0.65rem 1rem;
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    border-radius: 4px; cursor: pointer; font-size: 0.95rem;
    font-family: inherit; transition: all 0.15s;
  }
  button.btn:hover { background: #f0ece4; }
  button.btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  button.btn.primary:hover { background: #5a4230; }
  button.btn.ok { color: var(--ok); border-color: var(--ok); }
  button.btn.ok:hover { background: var(--ok); color: white; }
  button.btn.no { color: var(--no); border-color: var(--no); }
  button.btn.no:hover { background: var(--no); color: white; }
  button.btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .footer {
    margin-top: 1.5rem; text-align: center;
    color: var(--muted); font-size: 0.8rem;
    display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
  }
  .footer a, .footer label { color: var(--muted); cursor: pointer; text-decoration: underline; }
  .footer a:hover, .footer label:hover { color: var(--accent); }
  .footer input[type=file] { display: none; }

  .empty { text-align: center; color: var(--muted); padding: 3rem 0; }

  .box-dist {
    display: flex; gap: 0.25rem; font-size: 0.75rem;
    color: var(--muted); margin-top: 0.5rem;
  }
  .box-dist span {
    background: var(--card); border: 1px solid var(--line);
    padding: 0.15rem 0.5rem; border-radius: 3px;
  }

  /* ---- Browse view ---- */
  .browse-tabs {
    display: flex; gap: 0.5rem; margin-bottom: 1rem;
  }
  .browse-tabs button {
    flex: 1; background: var(--card); border: 1px solid var(--line);
    padding: 0.5rem 0.75rem; border-radius: 4px;
    cursor: pointer; font-family: inherit; font-size: 0.9rem;
  }
  .browse-tabs button.active { background: var(--accent); color: white; border-color: var(--accent); }

  .browse input[type=text] {
    width: 100%; padding: 0.6rem 0.8rem; font-size: 1rem;
    border: 1px solid var(--line); border-radius: 4px;
    font-family: inherit; background: var(--card); color: var(--ink);
  }
  .browse input[type=text]:focus { outline: 1px solid var(--accent); border-color: var(--accent); }

  .hint { color: var(--muted); font-size: 0.85rem; margin-top: 0.5rem; }
  .loading { text-align: center; color: var(--muted); padding: 2rem 0; }

  .verse-result {
    background: var(--card); border: 1px solid var(--line);
    padding: 0.75rem 1rem; border-radius: 4px; margin-top: 0.5rem;
    display: flex; gap: 0.75rem; align-items: flex-start;
  }
  .verse-result .vr-text { flex: 1; }
  .verse-result .vr-ref { font-size: 0.8rem; color: var(--accent); font-weight: 600; margin-bottom: 0.25rem; }
  .verse-result .vr-body { font-size: 1rem; line-height: 1.7; }
  .verse-result button {
    align-self: center; padding: 0.3rem 0.7rem;
    background: var(--card); border: 1px solid var(--accent); color: var(--accent);
    border-radius: 3px; cursor: pointer; font-size: 0.85rem; font-family: inherit;
    white-space: nowrap;
  }
  .verse-result button:hover { background: var(--accent); color: white; }
  .verse-result button.added { border-color: var(--ok); color: var(--ok); background: transparent; cursor: default; }
  .verse-result button.added:hover { background: transparent; color: var(--ok); }

  .book-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 0.4rem; margin-top: 0.5rem;
  }
  .book-grid button {
    padding: 0.5rem; background: var(--card); border: 1px solid var(--line);
    border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 0.9rem;
  }
  .book-grid button:hover { background: #f0ece4; border-color: var(--accent); }
  .book-grid .testament-label {
    grid-column: 1 / -1; color: var(--muted); font-size: 0.85rem;
    margin-top: 0.75rem; padding-bottom: 0.2rem; border-bottom: 1px solid var(--line);
  }

  .chap-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
    gap: 0.3rem; margin-top: 0.75rem;
  }
  .chap-grid button {
    padding: 0.4rem; background: var(--card); border: 1px solid var(--line);
    border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 0.85rem;
  }
  .chap-grid button:hover { background: #f0ece4; border-color: var(--accent); }
  .back-btn {
    background: none; border: none; color: var(--muted); cursor: pointer;
    padding: 0.25rem 0; font-family: inherit; font-size: 0.9rem;
  }
  .back-btn:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>和合本背經</h1>
    <div class="stats" id="stats">—</div>
  </header>

  <nav>
    <button class="active" data-view="drill">練習</button>
    <button data-view="exam">檢驗</button>
    <button data-view="browse">瀏覽</button>
    <button data-view="list">我的清單</button>
    <button data-view="settings">設定</button>
  </nav>

  <div id="content"></div>

  <div class="footer">
    <a href="#" id="export">匯出進度</a>
    <label for="import-file">匯入進度</label>
    <input type="file" id="import-file" accept=".json,application/json">
    <a href="#" id="reset">清除進度</a>
  </div>
</div>

<script src="verses.js"></script>
<script src="s2t.js"></script>
<script>
(() => {
  // ============================================================================
  // Constants
  // ============================================================================
  const PROGRESS_KEY = "bible-memorize-progress-v1";
  const CUSTOM_KEY   = "bible-memorize-custom-v1";
  const SETTINGS_KEY = "bible-memorize-settings-v1";
  const INTERVALS = [0, 1, 3, 7, 15];  // Leitner box intervals (days). Box 0 = due now.
  const MAX_BOX = 4;
  const TERMINAL_PUNCT = /[。」』！？]/;
  // Quality keywords found in higher-fidelity voice names across OSes/browsers.
  const HQ_VOICE_RE = /premium|enhanced|neural|wavenet|natural|高品質|高音質/i;
  // Show only Google voices in the picker (user preference).
  const VOICE_FILTER_RE = /google/i;

  // ============================================================================
  // Storage
  // ============================================================================
  const loadJSON = (key, fallback) => {
    try { return JSON.parse(localStorage.getItem(key)) || fallback; }
    catch { return fallback; }
  };
  const saveJSON = (key, value) => localStorage.setItem(key, JSON.stringify(value));

  let progress = loadJSON(PROGRESS_KEY, {});
  let customVerses = loadJSON(CUSTOM_KEY, []);  // [{ref, text}]
  let settings = loadJSON(SETTINGS_KEY, {
    voiceURI: "", rate: 0.85, pitch: 1.0,
    openai: { enabled: false, apiKey: "", voice: "alloy", model: "tts-1" },
  });
  if (!settings.openai) settings.openai = { enabled: false, apiKey: "", voice: "alloy", model: "tts-1" };

  // In-memory cache of OpenAI-generated audio blobs. Keyed by `${voice}|${model}|${rate}|${text}`.
  const openaiCache = new Map();

  const allVerses = () => {
    // Seed + custom, deduplicated by ref (custom overrides seed if same ref)
    const map = new Map();
    (window.VERSES || []).forEach(v => map.set(v.ref, v));
    customVerses.forEach(v => map.set(v.ref, v));
    return [...map.values()];
  };

  const getState = (ref) => progress[ref] || { box: 0, lastReviewed: null };
  const isDue = (ref) => {
    const s = getState(ref);
    if (!s.lastReviewed) return true;
    const days = (Date.now() - new Date(s.lastReviewed).getTime()) / 86400000;
    return days >= INTERVALS[s.box];
  };

  // ============================================================================
  // CUV data — lazy-loaded only when browse view is opened
  // ============================================================================
  let cuv = null;   // { meta, books, verses }
  let cuvByRef = null;  // Map<"可 10:45", "...text..."> for fast lookup
  let cuvByBook = null; // Map<slug, {abbr, zh, chapters: Map<int, Map<int,text>>}>
  let cuvLoading = null;

  function loadCUV() {
    if (cuv) return Promise.resolve(cuv);
    if (cuvLoading) return cuvLoading;
    cuvLoading = fetch("cuv.json").then(r => r.json()).then(data => {
      cuv = data;
      cuvByRef = new Map();
      cuvByBook = new Map();
      for (const b of data.books) {
        cuvByBook.set(b.slug, { ...b, chapters: new Map() });
      }
      for (const v of data.verses) {
        const ref = `${cuvByBook.get(v.book).abbr} ${v.chapter}:${v.verse}`;
        cuvByRef.set(ref, v.text);
        const bk = cuvByBook.get(v.book);
        if (!bk.chapters.has(v.chapter)) bk.chapters.set(v.chapter, new Map());
        bk.chapters.get(v.chapter).set(v.verse, v.text);
      }
      return data;
    });
    return cuvLoading;
  }

  // Build an alias map for parsing reference strings: "可", "馬可福音", "Mar", "mar" → slug
  function buildAliasMap() {
    const map = new Map();
    if (!cuv) return map;
    for (const b of cuv.books) {
      map.set(b.abbr, b.slug);
      map.set(b.zh, b.slug);
      map.set(b.slug.toLowerCase(), b.slug);
    }
    return map;
  }

  // Parse strings like "可 10:45", "馬可福音 10:45", "可10:45", "mar 10:45"
  function parseRef(s) {
    if (!cuv) return null;
    const aliases = buildAliasMap();
    const m = s.trim().match(/^([一-鿿]{1,6}|[A-Za-z]{2,3})\s*(\d{1,3})\s*[:：]\s*(\d{1,3})$/);
    if (!m) return null;
    const slug = aliases.get(m[1]) || aliases.get(m[1].toLowerCase());
    if (!slug) return null;
    const ch = parseInt(m[2], 10), vs = parseInt(m[3], 10);
    const bk = cuvByBook.get(slug);
    const text = bk?.chapters.get(ch)?.get(vs);
    if (!text) return null;
    return { ref: `${bk.abbr} ${ch}:${vs}`, text, book: slug, chapter: ch, verse: vs };
  }

  // ============================================================================
  // Masking
  // ============================================================================
  const isHan = (ch) => /[一-鿿]/.test(ch);

  function defaultRevealed(text) {
    const set = new Set();
    let hanIdx = 0;
    [...text].forEach((ch, i) => {
      if (isHan(ch)) {
        if (hanIdx % 3 === 0) set.add(i);
        hanIdx++;
      }
    });
    return set;
  }

  function renderMasked(text, revealed) {
    return [...text].map((ch, i) => {
      if (!isHan(ch)) return `<span>${escapeHtml(ch)}</span>`;
      if (revealed.has(i)) return `<span class="revealed">${escapeHtml(ch)}</span>`;
      return `<span class="masked">〇</span>`;
    }).join("");
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }

  // ============================================================================
  // Audio (Web Speech API)
  // ============================================================================
  // Voice lists in some browsers (Chrome) populate asynchronously. Cache once ready.
  let _voicesReady = null;
  function voicesReady() {
    if (_voicesReady) return _voicesReady;
    _voicesReady = new Promise(resolve => {
      const initial = speechSynthesis.getVoices();
      if (initial.length) return resolve(initial);
      speechSynthesis.addEventListener("voiceschanged", () => {
        resolve(speechSynthesis.getVoices());
      }, { once: true });
      // Safety timeout — some browsers never fire the event
      setTimeout(() => resolve(speechSynthesis.getVoices()), 1500);
    });
    return _voicesReady;
  }

  function listZhVoices(voices) {
    // Strict: only zh-TW (台灣國語). Fall back to all zh voices only when no zh-TW exists.
    const tw   = voices.filter(v => v.lang === "zh-TW");
    const allZh = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith("zh"));
    const pool = tw.length ? tw : allZh;
    const onlyGoogle = pool.filter(v => VOICE_FILTER_RE.test(v.name));
    return onlyGoogle.length ? onlyGoogle : pool;
  }

  // Smart default. Priority:
  //   1. user-saved voiceURI (if still available)
  //   2. zh-TW + premium keyword
  //   3. zh-TW
  //   4. zh-HK + premium
  //   5. zh-HK
  //   6. zh-CN + premium
  //   7. zh-CN
  //   8. any zh-*
  function pickBestVoice(voices) {
    if (settings.voiceURI) {
      const saved = voices.find(v => v.voiceURI === settings.voiceURI);
      if (saved && saved.lang === "zh-TW") return saved;  // honor saved only if it's zh-TW
    }
    // Strictly prefer zh-TW (台灣國語). Only consider other zh- variants as a last resort.
    const googleOnly = voices.filter(v => VOICE_FILTER_RE.test(v.name));
    const candidates = googleOnly.length ? googleOnly : voices;
    const tw = candidates.find(v => v.lang === "zh-TW");
    if (tw) return tw;
    // Fall back: any zh voice (so the app still has audio if zh-TW unavailable)
    return candidates.find(v => v.lang && v.lang.toLowerCase().startsWith("zh")) || null;
  }

  async function speakViaOpenAI(text) {
    const k = `${settings.openai.voice}|${settings.openai.model}|${settings.rate}|${text}`;
    let url = openaiCache.get(k);
    if (!url) {
      // Build request body. `instructions` is only supported by `gpt-4o-mini-tts`;
      // older `tts-1`/`tts-1-hd` ignore it (or 400 if strict). We send it only when supported.
      const body = {
        model: settings.openai.model,
        input: text,
        voice: settings.openai.voice,
        speed: Math.max(0.25, Math.min(4.0, settings.rate)),
        response_format: "mp3",
      };
      if (settings.openai.model === "gpt-4o-mini-tts") {
        body.instructions =
          "請以台灣國語(繁體中文)朗讀這段聖經經文。發音清晰、語速穩定、語氣莊重恭敬,符合 zh-TW 口音,不要使用大陸普通話腔調。";
      }
      const res = await fetch("https://api.openai.com/v1/audio/speech", {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${settings.openai.apiKey}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.text();
        alert(`OpenAI TTS 失敗 (${res.status})：${err.slice(0, 240)}`);
        return;
      }
      const blob = await res.blob();
      url = URL.createObjectURL(blob);
      openaiCache.set(k, url);
    }
    // Stop any prior playback
    if (window._curAudio) { try { window._curAudio.pause(); } catch {} }
    const audio = new Audio(url);
    window._curAudio = audio;
    audio.play().catch(e => alert("播放失敗：" + e.message));
  }

  async function speakViaBrowser(text) {
    speechSynthesis.cancel();
    const voices = await voicesReady();
    const pick = pickBestVoice(voices);
    const u = new SpeechSynthesisUtterance(text);
    if (pick) u.voice = pick;
    // Force zh-TW regardless of picked voice's lang, to hint Taiwanese pronunciation
    // (synthesizer may ignore if voice doesn't match, but worth trying)
    u.lang = "zh-TW";
    u.rate = settings.rate;
    u.pitch = settings.pitch;
    speechSynthesis.speak(u);
  }

  async function speak(text) {
    if (settings.openai?.enabled && settings.openai?.apiKey) {
      return speakViaOpenAI(text);
    }
    if (!window.speechSynthesis) {
      alert("此瀏覽器不支援語音合成");
      return;
    }
    return speakViaBrowser(text);
  }

  // ============================================================================
  // Drill view
  // ============================================================================
  let drill = { current: null, queue: [], revealed: new Set(), fullyShown: false };

  function buildDrillQueue() {
    const due = allVerses().filter(v => isDue(v.ref));
    due.sort((a, b) => {
      const sa = getState(a.ref), sb = getState(b.ref);
      if (!sa.lastReviewed && !sb.lastReviewed) return 0;
      if (!sa.lastReviewed) return -1;
      if (!sb.lastReviewed) return 1;
      return new Date(sa.lastReviewed) - new Date(sb.lastReviewed);
    });
    return due;
  }

  function nextDrillCard() {
    drill.queue = buildDrillQueue();
    drill.current = drill.queue[0] || null;
    drill.fullyShown = false;
    drill.revealed = drill.current ? defaultRevealed(drill.current.text) : new Set();
    renderDrill();
  }

  function renderDrill() {
    const content = document.getElementById("content");
    updateStats();

    if (allVerses().length === 0) {
      content.innerHTML = `
        <div class="card">
          <div class="empty">
            <div style="font-size:1.1rem;margin-bottom:0.75rem;">尚未加入經文</div>
            <div>切換到「瀏覽」分頁,搜尋或選取要背的經文。</div>
          </div>
        </div>`;
      return;
    }

    if (!drill.current) {
      content.innerHTML = `
        <div class="card">
          <div class="empty">
            <div style="font-size:1.2rem;margin-bottom:0.5rem;">今日已完成 ✓</div>
            <div>下一輪複習依 Leitner 間隔自動安排。</div>
          </div>
          ${renderBoxDist()}
        </div>`;
      return;
    }

    const masked = renderMasked(drill.current.text, drill.revealed);
    const box = getState(drill.current.ref).box;

    content.innerHTML = `
      <div class="card">
        <div class="ref">
          <span class="speak" data-action="speak" title="朗讀">🔊</span>
          ${escapeHtml(drill.current.ref)} · 盒 ${box}
        </div>
        <div class="text" id="verse">${masked}</div>
        <div class="controls">
          ${drill.fullyShown
            ? `<button class="btn ok" data-action="ok">記得</button>
               <button class="btn no" data-action="no">忘了</button>`
            : `<button class="btn" data-action="hint">提示</button>
               <button class="btn primary" data-action="show">顯示答案</button>
               <button class="btn" data-action="skip">跳過</button>`}
        </div>
        ${renderBoxDist()}
      </div>`;

    content.querySelectorAll("[data-action]").forEach(b => {
      b.addEventListener("click", () => handleDrill(b.dataset.action));
    });
  }

  function handleDrill(action) {
    const cur = drill.current;
    if (!cur && action !== "speak") return;

    if (action === "speak") {
      speak(cur ? cur.text : "");
    } else if (action === "hint") {
      const hidden = [...cur.text]
        .map((ch, i) => isHan(ch) && !drill.revealed.has(i) ? i : -1)
        .filter(i => i >= 0);
      if (hidden.length) {
        drill.revealed.add(hidden[Math.floor(Math.random() * hidden.length)]);
      }
      renderDrill();
    } else if (action === "show") {
      drill.revealed = new Set([...cur.text].map((_, i) => i));
      drill.fullyShown = true;
      renderDrill();
    } else if (action === "skip") {
      drill.queue.shift();
      drill.current = drill.queue[0] || null;
      drill.fullyShown = false;
      drill.revealed = drill.current ? defaultRevealed(drill.current.text) : new Set();
      renderDrill();
    } else if (action === "ok") {
      const s = getState(cur.ref);
      progress[cur.ref] = { box: Math.min(s.box + 1, MAX_BOX), lastReviewed: new Date().toISOString() };
      saveJSON(PROGRESS_KEY, progress);
      nextDrillCard();
    } else if (action === "no") {
      progress[cur.ref] = { box: 0, lastReviewed: new Date().toISOString() };
      saveJSON(PROGRESS_KEY, progress);
      nextDrillCard();
    }
  }

  function updateStats() {
    const total = allVerses().length;
    const due = allVerses().filter(v => isDue(v.ref)).length;
    const mastered = allVerses().filter(v => getState(v.ref).box === MAX_BOX).length;
    document.getElementById("stats").textContent =
      `今日 ${due} · 全部 ${total} · 已熟練 ${mastered}`;
  }

  function renderBoxDist() {
    const counts = [0, 0, 0, 0, 0];
    allVerses().forEach(v => counts[getState(v.ref).box]++);
    return `<div class="box-dist">
      ${counts.map((c, i) => `<span>盒 ${i}: ${c}</span>`).join("")}
    </div>`;
  }

  // ============================================================================
  // Exam view (speech-recognition verification)
  // ============================================================================
  const SR_CLASS = window.SpeechRecognition || window.webkitSpeechRecognition;

  let exam = {
    current: null,
    phase: "ready",      // "ready" | "preview" | "listening" | "result"
    finalText: "",
    interimText: "",
    result: null,        // {total, matched, accuracy, statuses, canonChars, extras}
  };
  let _recognition = null;

  function abortRecognition() {
    if (_recognition) {
      try {
        _recognition.onend = null;
        _recognition.onresult = null;
        _recognition.onerror = null;
        _recognition.abort();
      } catch {}
      _recognition = null;
    }
  }

  // Convert Simplified (and TW-variant Traditional) → general Traditional using
  // the bundled OpenCC character map. Browser speech recognizers (esp.
  // Chrome/Google) often return Simplified even with lang="zh-TW", so we
  // normalize before comparing against CUV.
  if (!window.S2T) {
    console.warn("[memorize] s2t.js not loaded — Simplified characters in voice recognition will not be normalized.");
  } else {
    console.log(`[memorize] s2t map loaded (${Object.keys(window.S2T).length} entries)`);
  }
  function traditionalize(s) {
    if (!window.S2T) return s;
    return [...(s || "")].map(c => window.S2T[c] || c).join("");
  }

  function normalizeHan(s) {
    return [...(s || "")].filter(c => /[一-鿿]/.test(c));
  }

  // LCS-based char-by-char alignment. Returns ops: {type, c}.
  function lcsAlign(a, b) {
    const n = a.length, m = b.length;
    const dp = Array.from({length: n+1}, () => new Int32Array(m+1));
    for (let i = 0; i < n; i++) {
      for (let j = 0; j < m; j++) {
        if (a[i] === b[j]) dp[i+1][j+1] = dp[i][j] + 1;
        else dp[i+1][j+1] = Math.max(dp[i][j+1], dp[i+1][j]);
      }
    }
    const ops = [];
    let i = n, j = m;
    while (i > 0 && j > 0) {
      if (a[i-1] === b[j-1])      { ops.push({type:"match",   c:a[i-1]}); i--; j--; }
      else if (dp[i-1][j] >= dp[i][j-1]) { ops.push({type:"missing", c:a[i-1]}); i--; }
      else                         { ops.push({type:"extra",   c:b[j-1]}); j--; }
    }
    while (i > 0) { ops.push({type:"missing", c:a[i-1]}); i--; }
    while (j > 0) { ops.push({type:"extra",   c:b[j-1]}); j--; }
    return ops.reverse();
  }

  function compareVerse(canonical, spoken) {
    const a = normalizeHan(canonical);
    // Convert Simplified → Traditional before comparison
    const b = normalizeHan(traditionalize(spoken));
    const ops = lcsAlign(a, b);
    const statuses = [];
    for (const op of ops) {
      if (op.type === "match")        statuses.push("match");
      else if (op.type === "missing") statuses.push("miss");
    }
    const matched = statuses.filter(s => s === "match").length;
    const extras  = ops.filter(o => o.type === "extra").map(o => o.c).join("");
    return {
      total: a.length,
      matched,
      accuracy: a.length ? matched / a.length : 0,
      statuses, canonChars: a, extras,
    };
  }

  function nextExamCard() {
    abortRecognition();
    const queue = buildDrillQueue();
    exam.current = queue[0] || null;
    exam.phase = "ready";
    exam.finalText = "";
    exam.interimText = "";
    exam.result = null;
    renderExam();
  }

  function renderExam() {
    const content = document.getElementById("content");
    updateStats();

    if (!SR_CLASS) {
      content.innerHTML = `<div class="card"><div class="empty">
        此瀏覽器不支援語音辨識。<br>請改用 Chrome、Safari (iOS 14.5+ / macOS 14+) 或 Edge。
      </div></div>`;
      return;
    }

    if (allVerses().length === 0) {
      content.innerHTML = `<div class="card"><div class="empty">
        <div style="font-size:1.1rem;margin-bottom:0.75rem;">尚未加入經文</div>
        <div>切換到「瀏覽」分頁,搜尋或選取要背的經文。</div>
      </div></div>`;
      return;
    }

    if (!exam.current) {
      content.innerHTML = `<div class="card"><div class="empty">
        <div style="font-size:1.2rem;margin-bottom:0.5rem;">今日已完成 ✓</div>
        <div>下一輪複習依 Leitner 間隔自動安排。</div>
      </div></div>`;
      return;
    }

    const ref = exam.current.ref;
    const box = getState(ref).box;

    if (exam.phase === "ready") {
      content.innerHTML = `
        <div class="card">
          <div class="ref">${escapeHtml(ref)} · 盒 ${box}</div>
          <div class="text" style="text-align:center;color:var(--muted);padding:2rem 0;font-size:1.1rem;">
            憑記憶背誦
          </div>
          <div class="controls">
            <button class="btn" data-action="preview">💭 顯示經文</button>
            <button class="btn primary" data-action="start">🎤 開始錄音</button>
            <button class="btn" data-action="skip">跳過</button>
          </div>
        </div>`;
    } else if (exam.phase === "preview") {
      content.innerHTML = `
        <div class="card">
          <div class="ref">${escapeHtml(ref)} · 盒 ${box}</div>
          <div class="text">${escapeHtml(exam.current.text)}</div>
          <div class="controls">
            <button class="btn primary" data-action="start">🎤 開始錄音</button>
            <button class="btn" data-action="back">返回</button>
          </div>
        </div>`;
    } else if (exam.phase === "listening") {
      const live = traditionalize(exam.finalText + exam.interimText);
      content.innerHTML = `
        <div class="card">
          <div class="ref">${escapeHtml(ref)} · 盒 ${box}</div>
          <div class="text" id="exam-live" style="font-size:1.1rem;color:var(--muted);min-height:6rem;">
            ${live ? escapeHtml(live) : "🎙️ 正在聆聽…請開始背誦"}
          </div>
          <div class="controls">
            <button class="btn no" data-action="stop">🛑 完成</button>
          </div>
        </div>`;
    } else if (exam.phase === "result") {
      const r = exam.result;
      const pct = Math.round(r.accuracy * 100);
      const passed = pct >= 80;
      const diff = r.canonChars.map((c, i) =>
        `<span style="color:${r.statuses[i]==='match' ? 'var(--ok)' : 'var(--no)'};font-weight:${r.statuses[i]==='match'?'normal':'600'};">${escapeHtml(c)}</span>`
      ).join("");

      content.innerHTML = `
        <div class="card">
          <div class="ref">${escapeHtml(ref)} · 盒 ${box}</div>
          <div style="font-size:1.4rem;margin:0.75rem 0;text-align:center;color:${passed?'var(--ok)':'var(--no)'};">
            ${passed ? '✓' : '✗'} ${r.matched} / ${r.total} 字正確 (${pct}%)
          </div>
          <div class="text" style="line-height:2.4;">${diff}</div>
          <div style="margin-top:0.75rem;padding:0.75rem;background:#f7f4ed;border-radius:4px;font-size:0.9rem;color:var(--muted);line-height:1.7;">
            <div><strong style="color:var(--ink);">原文:</strong>${escapeHtml(exam.current.text)}</div>
            <div style="margin-top:0.4rem;"><strong style="color:var(--ink);">你說:</strong>${escapeHtml(traditionalize(exam.finalText)) || "<無辨識結果>"}</div>
            ${r.extras ? `<div style="margin-top:0.4rem;color:var(--no);"><strong>多餘字:</strong>${escapeHtml(r.extras)}</div>` : ""}
          </div>
          <div class="controls" style="margin-top:1rem;">
            <button class="btn ok" data-action="pass">通過</button>
            <button class="btn no" data-action="fail">不通過</button>
            <button class="btn" data-action="retry">再試</button>
          </div>
        </div>`;
    }

    content.querySelectorAll("[data-action]").forEach(b =>
      b.addEventListener("click", () => handleExam(b.dataset.action))
    );
  }

  function handleExam(action) {
    if (action === "preview") { exam.phase = "preview"; renderExam(); }
    else if (action === "back") { exam.phase = "ready"; renderExam(); }
    else if (action === "start") { startExamListening(); }
    else if (action === "stop") { if (_recognition) { try { _recognition.stop(); } catch {} } else finalizeExamListening(); }
    else if (action === "skip") {
      // Skip without grading: drop current from queue temporarily
      const q = buildDrillQueue().filter(v => v.ref !== exam.current.ref);
      exam.current = q[0] || null;
      exam.phase = "ready"; exam.finalText = ""; exam.interimText = ""; exam.result = null;
      renderExam();
    }
    else if (action === "pass") {
      const s = getState(exam.current.ref);
      progress[exam.current.ref] = { box: Math.min(s.box + 1, MAX_BOX), lastReviewed: new Date().toISOString() };
      saveJSON(PROGRESS_KEY, progress);
      nextExamCard();
    }
    else if (action === "fail") {
      progress[exam.current.ref] = { box: 0, lastReviewed: new Date().toISOString() };
      saveJSON(PROGRESS_KEY, progress);
      nextExamCard();
    }
    else if (action === "retry") {
      exam.phase = "ready"; exam.finalText = ""; exam.interimText = ""; exam.result = null;
      renderExam();
    }
  }

  function startExamListening() {
    if (!SR_CLASS) return;
    exam.finalText = "";
    exam.interimText = "";
    exam.phase = "listening";
    renderExam();

    const rec = new SR_CLASS();
    rec.lang = "zh-TW";
    rec.continuous = true;
    rec.interimResults = true;

    rec.onresult = (e) => {
      let final = "", interim = "";
      for (let i = 0; i < e.results.length; i++) {
        const r = e.results[i];
        if (r.isFinal) final += r[0].transcript;
        else interim += r[0].transcript;
      }
      exam.finalText = final;
      exam.interimText = interim;
      // In-place update of just the transcript line to avoid full re-render flicker
      const live = document.getElementById("exam-live");
      if (live) live.textContent = traditionalize(final + interim) || "🎙️ 正在聆聽…";
    };
    rec.onerror = (e) => {
      if (e.error === "not-allowed") {
        alert("麥克風存取被拒絕。請在瀏覽器設定中允許此網站使用麥克風。");
      } else if (e.error !== "aborted" && e.error !== "no-speech") {
        alert("語音辨識錯誤:" + e.error);
      }
      abortRecognition();
      exam.phase = "ready";
      renderExam();
    };
    rec.onend = () => finalizeExamListening();

    try {
      rec.start();
      _recognition = rec;
    } catch (err) {
      alert("無法啟動語音辨識:" + err.message);
      exam.phase = "ready"; renderExam();
    }
  }

  function finalizeExamListening() {
    if (exam.phase !== "listening") return;  // guard against re-entry
    _recognition = null;
    exam.result = compareVerse(exam.current.text, exam.finalText);
    exam.phase = "result";
    renderExam();
  }

  // ============================================================================
  // Browse view
  // ============================================================================
  let browse = { mode: "ref", bookSlug: null, chapter: null, query: "" };

  async function renderBrowse() {
    const content = document.getElementById("content");
    updateStats();

    content.innerHTML = `
      <div class="browse">
        <div class="browse-tabs">
          <button data-mode="ref"    class="${browse.mode==="ref" ? "active" : ""}">直接輸入</button>
          <button data-mode="search" class="${browse.mode==="search" ? "active" : ""}">搜尋經文</button>
          <button data-mode="book"   class="${browse.mode==="book" ? "active" : ""}">按卷目錄</button>
        </div>
        <div id="browse-body">
          <div class="loading">載入和合本資料 …</div>
        </div>
      </div>`;

    content.querySelectorAll("[data-mode]").forEach(b => {
      b.addEventListener("click", () => {
        browse.mode = b.dataset.mode;
        browse.bookSlug = null; browse.chapter = null;

      });
    });

    try { await loadCUV(); }
    catch (e) {
      document.getElementById("browse-body").innerHTML =
        `<div class="empty">無法載入 cuv.json:${escapeHtml(String(e))}</div>`;

    }

    if (browse.mode === "ref") renderBrowseRef();
    else if (browse.mode === "search") renderBrowseSearch();

  function renderBrowseRef() {
    const body = document.getElementById("browse-body");
    body.innerHTML = `
      <input type="text" id="ref-input" placeholder="輸入經卷編號(例如:可 10:45 或 馬可福音 10:45)">
      <div class="hint">支援:中文簡稱(可、太、約)、全名(馬可福音)、英文 slug(mar)。</div>
      <div id="ref-result"></div>`;
    const input = document.getElementById("ref-input");
    input.focus();
    input.addEventListener("input", (e) => {
      const v = parseRef(e.target.value);
      const r = document.getElementById("ref-result");
      r.innerHTML = v ? renderVerseResult(v) : (e.target.value.trim() ? `<div class="hint">找不到此經文。</div>` : "");
      r.querySelectorAll("[data-add]").forEach(b => b.addEventListener("click", () => addVerse(b.dataset.add)));
    });
  }

  function renderBrowseSearch() {
    const body = document.getElementById("browse-body");
    body.innerHTML = `
      <input type="text" id="search-input" placeholder="搜尋經文內容(例如:愛是恆久、互相效力)">
      <div class="hint">最少 2 個字。結果上限 50 條。</div>
      <div id="search-results"></div>`;
    const input = document.getElementById("search-input");
    input.focus();
    let timer;
    input.addEventListener("input", (e) => {
      clearTimeout(timer);
      const q = e.target.value.trim();
      const r = document.getElementById("search-results");
      if (q.length < 2) { r.innerHTML = ""; return; }
      timer = setTimeout(() => {
        const results = [];
        for (const v of cuv.verses) {
          if (v.text.includes(q)) {
            const bk = cuvByBook.get(v.book);
            results.push({ ref: `${bk.abbr} ${v.chapter}:${v.verse}`, text: v.text });
            if (results.length >= 50) break;
          }
        }
        if (!results.length) { r.innerHTML = `<div class="hint">沒有結果。</div>`; return; }
        r.innerHTML = results.map(renderVerseResult).join("");
        r.querySelectorAll("[data-add]").forEach(b => b.addEventListener("click", () => addVerse(b.dataset.add)));
      }, 150);
    });
  }

  function renderBrowseBook() {
    const body = document.getElementById("browse-body");

    if (!browse.bookSlug) {
      const ot = cuv.books.filter(b => b.testament === "OT");
      const nt = cuv.books.filter(b => b.testament === "NT");
      const renderGroup = (label, books) =>
        `<div class="testament-label">${label}</div>` +
        books.map(b => `<button data-slug="${b.slug}">${escapeHtml(b.zh)}</button>`).join("");
      body.innerHTML = `<div class="book-grid">
        ${renderGroup("舊約", ot)}
        ${renderGroup("新約", nt)}
      </div>`;
      body.querySelectorAll("[data-slug]").forEach(b => {
        b.addEventListener("click", () => {
          browse.bookSlug = b.dataset.slug;
          browse.chapter = null;
          renderBrowse();
        });
      });
      return;
    }

    const bk = cuvByBook.get(browse.bookSlug);
    if (!browse.chapter) {
      const chs = [...bk.chapters.keys()].sort((a,b) => a-b);
      body.innerHTML = `
        <button class="back-btn" data-back>← 回卷目錄</button>
        <div style="font-weight:600;margin:0.5rem 0;">${escapeHtml(bk.zh)} — 選擇章</div>
        <div class="chap-grid">
          ${chs.map(c => `<button data-chap="${c}">${c}</button>`).join("")}
        </div>`;
      body.querySelector("[data-back]").addEventListener("click", () => {
        browse.bookSlug = null; renderBrowse();
      });
      body.querySelectorAll("[data-chap]").forEach(b => {
        b.addEventListener("click", () => {
          browse.chapter = parseInt(b.dataset.chap, 10);
          renderBrowse();
        });
      });
      return;
    }

    const verses = [...bk.chapters.get(browse.chapter).entries()].sort((a,b) => a[0]-b[0]);
    body.innerHTML = `
      <button class="back-btn" data-back>← 回章目錄</button>
      <div style="font-weight:600;margin:0.5rem 0;">${escapeHtml(bk.zh)} ${browse.chapter} — 點選加入</div>
      <div id="ch-verses">
        ${verses.map(([vs, text]) => renderVerseResult({
          ref: `${bk.abbr} ${browse.chapter}:${vs}`,
          text
        })).join("")}
      </div>`;
    body.querySelector("[data-back]").addEventListener("click", () => {
      browse.chapter = null; renderBrowse();
    });
    body.querySelectorAll("[data-add]").forEach(b => b.addEventListener("click", () => addVerse(b.dataset.add)));
  }

  function renderVerseResult(v) {
    const inList = allVerses().some(x => x.ref === v.ref);
    return `
      <div class="verse-result" data-ref="${escapeHtml(v.ref)}">
        <div class="vr-text">
          <div class="vr-ref">${escapeHtml(v.ref)}</div>
          <div class="vr-body">${escapeHtml(v.text)}</div>
        </div>
        <button data-add="${escapeHtml(v.ref)}" class="${inList ? "added" : ""}">${inList ? "已加入" : "加入"}</button>
      </div>`;
  }

  function addVerse(ref) {
    if (allVerses().some(v => v.ref === ref)) return;
    const text = cuvByRef.get(ref);
    if (!text) return;
    customVerses.push({ ref, text });
    saveJSON(CUSTOM_KEY, customVerses);
    // Re-render the verse-result item to toggle "已加入"
    const node = document.querySelector(`.verse-result[data-ref="${CSS.escape(ref)}"] button`);
    if (node) { node.textContent = "已加入"; node.classList.add("added"); node.removeAttribute("data-add"); }
    updateStats();
  }

          </div>
        </div>

        <div class="controls" style="margin-top:1rem;">
          <button class="btn primary" id="test-speak">🔊 試聽</button>
          <button class="btn" id="reset-voice">恢復預設</button>
        </div>

        <div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--line);">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
            <div style="font-weight:600;">OpenAI 雲端朗讀(更自然的人聲)</div>
            <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.9rem;">
              <input type="checkbox" id="openai-enabled" ${settings.openai.enabled ? "checked" : ""}> 啟用
            </label>
          </div>
          <div class="hint">啟用後,🔊 將改用 OpenAI TTS。每次朗讀會把該節經文送到 OpenAI 並下載音檔。費用約 0.0015 cent / 字($15 / 1M chars,tts-1)。</div>

          <div style="margin-top:0.75rem;">
            <label style="display:block;font-size:0.9rem;color:var(--muted);margin-bottom:0.25rem;">API 金鑰</label>
            <input type="password" id="openai-key" placeholder="sk-..." value="${escapeHtml(settings.openai.apiKey)}"
              style="width:100%;padding:0.55rem;border:1px solid var(--line);border-radius:4px;background:var(--card);color:var(--ink);font-family:ui-monospace,Menlo,monospace;font-size:0.9rem;">
            <div class="hint">取自 <a href="https://platform.openai.com/api-keys" target="_blank" style="color:var(--accent);">platform.openai.com/api-keys</a>。僅存於本機 localStorage,不會傳到任何第三方伺服器。</div>
          </div>

          <div style="display:flex;gap:0.75rem;margin-top:0.75rem;">
            <div style="flex:1;">
              <label style="display:block;font-size:0.9rem;color:var(--muted);margin-bottom:0.25rem;">聲音</label>
              <select id="openai-voice" style="width:100%;padding:0.5rem;border:1px solid var(--line);border-radius:4px;background:var(--card);color:var(--ink);font-family:inherit;">
                ${[
                  ["alloy",   "alloy(中性)"],
                  ["echo",    "echo(男)"],
                  ["fable",   "fable(英式男)"],
                  ["onyx",    "onyx(低沉男)"],
                  ["nova",    "nova(活潑女)"],
                  ["shimmer", "shimmer(溫和女)"],
                ].map(([v,l]) => `<option value="${v}" ${settings.openai.voice===v?"selected":""}>${l}</option>`).join("")}
              </select>
            </div>
            <div style="flex:1;">
              <label style="display:block;font-size:0.9rem;color:var(--muted);margin-bottom:0.25rem;">模型</label>
              <select id="openai-model" style="width:100%;padding:0.5rem;border:1px solid var(--line);border-radius:4px;background:var(--card);color:var(--ink);font-family:inherit;">
                ${[
                  ["gpt-4o-mini-tts",  "gpt-4o-mini-tts(推薦,支援台灣國語腔調)"],
                  ["tts-1-hd",         "tts-1-hd(高品質,通用普通話)"],
                  ["tts-1",            "tts-1(快、便宜,通用普通話)"],
                ].map(([v,l]) => `<option value="${v}" ${settings.openai.model===v?"selected":""}>${l}</option>`).join("")}
              </select>
            </div>
          </div>

          <div class="controls" style="margin-top:0.75rem;">
            <button class="btn primary" id="test-openai" ${settings.openai.apiKey ? "" : "disabled"}>🔊 試聽 OpenAI</button>
          </div>
        </div>

        <div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--line);font-size:0.85rem;color:var(--muted);line-height:1.7;">
          <div style="font-weight:600;color:var(--ink);margin-bottom:0.5rem;">關於聲音</div>
          <div>OpenAI TTS 是目前最接近人聲的選項;若不想用 API,可改用瀏覽器內建聲音(免費,品質視 OS 而定)。Google 中文 TTS 由 Chrome 內建提供,屬於雲端合成,需要連線。</div>
        </div>
      </div>`;

    const voiceSel = document.getElementById("voice-select");
    const rateSlider = document.getElementById("rate-slider");
    const pitchSlider = document.getElementById("pitch-slider");

    if (voiceSel) {
      voiceSel.addEventListener("change", () => {
        settings.voiceURI = voiceSel.value;
        saveJSON(SETTINGS_KEY, settings);
      });
    }
    rateSlider.addEventListener("input", () => {
      settings.rate = parseFloat(rateSlider.value);
      document.getElementById("rate-val").textContent = settings.rate.toFixed(2);
      saveJSON(SETTINGS_KEY, settings);
    });
    pitchSlider.addEventListener("input", () => {
      settings.pitch = parseFloat(pitchSlider.value);
      document.getElementById("pitch-val").textContent = settings.pitch.toFixed(2);
      saveJSON(SETTINGS_KEY, settings);
    });
    document.getElementById("test-speak").addEventListener("click", () => {
      // 試聽 button always uses browser voice so user can compare
      speakViaBrowser(sampleText);
    });
    document.getElementById("reset-voice").addEventListener("click", () => {
      settings = {
        voiceURI: "", rate: 0.85, pitch: 1.0,
        openai: { ...settings.openai },  // preserve OpenAI config
      };
      saveJSON(SETTINGS_KEY, settings);
      renderSettings();
    });

    // OpenAI controls
    const oEnabled = document.getElementById("openai-enabled");
    const oKey     = document.getElementById("openai-key");
    const oVoice   = document.getElementById("openai-voice");
    const oModel   = document.getElementById("openai-model");
    const oTest    = document.getElementById("test-openai");

    const saveOpenAI = () => {
      settings.openai = {
        enabled: oEnabled.checked,
        apiKey:  oKey.value.trim(),
        voice:   oVoice.value,
        model:   oModel.value,
      };
      saveJSON(SETTINGS_KEY, settings);
      oTest.disabled = !settings.openai.apiKey;
    };

    oEnabled.addEventListener("change", saveOpenAI);
    oKey.addEventListener("input", saveOpenAI);
    oVoice.addEventListener("change", saveOpenAI);
    oModel.addEventListener("change", saveOpenAI);
    oTest.addEventListener("click", async () => {
      if (!settings.openai.apiKey) { alert("請先輸入 API 金鑰。"); return; }
      oTest.disabled = true;
      oTest.textContent = "下載中…";
      try { await speakViaOpenAI(sampleText); }
      finally {
        oTest.disabled = false;
        oTest.textContent = "🔊 試聽 OpenAI";
      }
    });
  }

  // ============================================================================
  // Export / Import
  // ============================================================================
  function exportProgress() {
    const blob = new Blob([JSON.stringify({
      progress, customVerses,
      exportedAt: new Date().toISOString(),
      version: 1,
    }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `背經進度-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function importProgress(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data.progress || !data.customVerses) throw new Error("檔案缺少 progress 或 customVerses 欄位");

        // Merge progress: max box for each ref; latest lastReviewed wins
        for (const [ref, s] of Object.entries(data.progress)) {
          const existing = progress[ref];
          if (!existing || s.box > existing.box ||
              (s.box === existing.box && new Date(s.lastReviewed) > new Date(existing.lastReviewed))) {
            progress[ref] = s;
          }
        }
        // Merge custom verses (dedupe by ref)
        const refs = new Set(customVerses.map(v => v.ref));
        for (const v of data.customVerses) {
          if (!refs.has(v.ref)) customVerses.push(v);
        }
        saveJSON(PROGRESS_KEY, progress);
        saveJSON(CUSTOM_KEY, customVerses);
        alert(`匯入完成。共合併 ${Object.keys(data.progress).length} 條進度,${data.customVerses.length} 條自訂經文。`);
        setView(currentView);
      } catch (e) {
        alert(`匯入失敗:${e.message}`);
      }
    };
    reader.readAsText(file);
  }

  // ============================================================================
  // View routing
  // ============================================================================
  let currentView = "drill";

  function setView(v) {
    // Cleanup: stop any active speech recognition when leaving exam view
    if (currentView === "exam" && v !== "exam") abortRecognition();
    currentView = v;
    document.querySelectorAll("nav [data-view]").forEach(b => {
      b.classList.toggle("active", b.dataset.view === v);
    });
    if (v === "drill") { nextDrillCard(); }
    else if (v === "exam") { nextExamCard(); }
    else if (v === "browse") { renderBrowse(); }
    else if (v === "list") { renderList(); }
    else if (v === "settings") { renderSettings(); }
  }

  document.querySelectorAll("nav [data-view]").forEach(b => {
    b.addEventListener("click", () => setView(b.dataset.view));
  });

  document.getElementById("export").addEventListener("click", (e) => {
    e.preventDefault(); exportProgress();
  });
  document.getElementById("import-file").addEventListener("change", (e) => {
    if (e.target.files[0]) importProgress(e.target.files[0]);
    e.target.value = "";
  });
  document.getElementById("reset").addEventListener("click", (e) => {
    e.preventDefault();
    if (confirm("確定要清除所有進度?(自訂經文也會刪除,但聲音設定保留)")) {
      localStorage.removeItem(PROGRESS_KEY);
      localStorage.removeItem(CUSTOM_KEY);
      progress = {}; customVerses = [];
      setView(currentView);
    }
  });

  setView("drill");
})();
</script>
</body>
</html>
